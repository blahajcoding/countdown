<!DOCTYPE html>
<!-- Meow -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://raw.githubusercontent.com/mckamey/countdownjs/master/countdown.min.js" defer></script>
</head>
<body>
    <hstack class="timer">
        <box id="days">00</box>
        <box id="hours">00</box>
        <box id="minutes">00</box>
        <box id="seconds">00</box>
    </hstack>
</body>
</html>
